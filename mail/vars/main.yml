# The mail_external and mail_internal roles, which pull in this role via import,
# both use a split exim configuration so that they can inject additional
# configuration files.

mta_configtype: smarthost
mta_other_hostnames: '{{ home_domain }}'
mta_readhost: ''
mta_use_split_config: 'true'
mta_hide_mailname: 'false'
mta_localdelivery: 'maildir_home'
