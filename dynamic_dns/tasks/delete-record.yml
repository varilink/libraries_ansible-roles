# ------------------------------------------------------------------------------
# dynamic_dns/tasks/delete-record.yml
# ------------------------------------------------------------------------------

# Delete a dynamic DNS record. This task list wraps the delete-record.yml task
# list from the dns_api role. It adds the awareness that the record type to be
# deleted must be "A" and that we also need to remove a Dynamic DNS record
# configuration file.

---

- name: Delete dynamic DNS record file
  ansible.builtin.file:
    path: "{{ dynamic_dns_records_dir }}/\
      {{ dns_record_hostname }}.{{ domain_name }}.yml"
    state: absent
  become: yes

- ansible.builtin.import_role:
    name: dns_api
    tasks_from: delete-record
  vars:
    dns_record_type: A
