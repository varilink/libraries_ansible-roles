# ------------------------------------------------------------------------------
# database/tasks/import-site.yml
# ------------------------------------------------------------------------------

---

- name: Import to the site database from the dump file
  community.mysql.mysql_db:
    name: "{{ wp_database_name }}"
    state: import
    target: /tmp/{{ dump_file }}
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: yes
